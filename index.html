<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f97316">
<title>Fikri Store</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap');
body { font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
@keyframes fadeIn { from { opacity:0; transform: translateY(12px);} to { opacity:1; transform: translateY(0);} }
@keyframes pulse-ring { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.3); opacity: 0; } }
.animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
.pulse-ring::before { content:''; position:absolute; inset:-8px; border-radius: 24px; border: 2px solid #f97316; animation: pulse-ring 2s infinite; }
</style>
</head>
<body class="bg-white h-screen flex flex-col items-center justify-center p-6 select-none">

<div class="text-center animate-fade-in">
  <div class="relative inline-block mb-6">
    <div class="w-24 h-24 bg-orange-500 rounded-3xl flex items-center justify-center shadow-xl shadow-orange-200 pulse-ring">
      <i class="fa-solid fa-boxes-stacked text-white text-3xl"></i>
    </div>
  </div>
  <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight mb-1">Fikri Store</h1>
  <p class="text-sm text-slate-400 font-medium mb-10">Smart Inventory & Profit Manager</p>
  
  <div class="space-y-3">
    <div class="flex justify-center gap-1.5">
      <div class="w-2 h-2 bg-orange-500 rounded-full animate-bounce" style="animation-delay:0ms"></div>
      <div class="w-2 h-2 bg-orange-500 rounded-full animate-bounce" style="animation-delay:150ms"></div>
      <div class="w-2 h-2 bg-orange-500 rounded-full animate-bounce" style="animation-delay:300ms"></div>
    </div>
    <p class="text-xs font-medium text-slate-400" id="statusText">Initializing...</p>
  </div>
</div>

<div class="fixed bottom-8 left-0 right-0 text-center">
  <p class="text-[10px] text-slate-300">v1.0 · Online Mode Required</p>
</div>

<script src="app.js"></script>
<script>
App.init();

const statusText = document.getElementById('statusText');

function proceed() {
  statusText.textContent = 'Loading your store...';
  statusText.className = 'text-xs font-medium text-green-600';
  setTimeout(() => {
    if (App.isAuth()) {
      window.location.href = 'dashboard.html';
    } else {
      window.location.href = 'login.html';
    }
  }, 1500);
}

if (!navigator.onLine) {
  statusText.textContent = 'Offline — Internet required';
  statusText.className = 'text-xs font-bold text-red-500';
  alert('⚠️ You are currently OFFLINE\n\nFikri Store requires an active internet connection to function. Please connect to Wi-Fi or mobile data and reopen the app.');
} else {
  proceed();
}

window.addEventListener('offline', () => {
  alert('⚠️ Connection lost. This app requires internet to work.');
});
</script>
</body>
</html>
